version: "3.9"

services:
  patient-service:
    build: .
    ports:
      - "5000:5000"
    env_file: .env
    depends_on:
      - ${DB_SERVER}
  db:
    image: mysql:8.0
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD}
      MYSQL_DATABASE: ${DATABASE}
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql

volumes:
  db_data: