services:

  # ── Doctor Service ────────────────────────────────────────────────────────
  doctor-service:
    build:
      context: ./atomic/doctor
    ports:
      - "5001:5001"
    environment:
      - dbURL=mysql+pymysql://root:root@doctor-db:3306/doctor_db
    depends_on:
      doctor-db:
        condition: service_healthy

  doctor-db:
    image: mysql:8.0
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: doctor_db
    ports:
      - "3307:3306"
    volumes:
      - doctor_db_data:/var/lib/mysql
      - ./atomic/doctor/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-P", "3306", "-u", "root", "--password=root"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 30s

  # ── Appointment Service ───────────────────────────────────────────────────
  appointment-service:
    build:
      context: ./atomic/appointment
    ports:
      - "5002:5002"
    environment:
      - dbURL=mysql+pymysql://root:root@appointment-db:3306/appointment_db
    depends_on:
      appointment-db:
        condition: service_healthy

  appointment-db:
    image: mysql:8.0
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: appointment_db
    ports:
      - "3308:3306"
    volumes:
      - appointment_db_data:/var/lib/mysql
      - ./atomic/appointment/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-P", "3306", "-u", "root", "--password=root"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 30s

  # ── Invoice Service ───────────────────────────────────────────────────
  invoice-service:
    build:
      context: ./atomic/invoice
    ports:
      - "5005:5005"
    environment:
      - dbURL=mysql+pymysql://root:root@invoice-db:3306/invoice_db
    depends_on:
      invoice-db:
        condition: service_healthy

  invoice-db:
    image: mysql:8.0
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: invoice_db
    ports:
      - "3310:3306"
    volumes:
      - invoice_db_data:/var/lib/mysql
      - ./atomic/invoice/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-P", "3306", "-u", "root", "--password=root"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 30s
  # ── Patient Service ───────────────────────────────────────────────────
  patient-service:
    build:
      context: ./atomic/patient
    ports:
      - "5003:5003"
    env_file: .env
    depends_on:
      patient-db:
        condition: service_healthy
  patient-db:
    image: mysql:8.0
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD}
      MYSQL_DATABASE: ${DATABASE}
    ports:
      - "3309:3306"
    volumes:
      - patient_db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-P", "3306", "-u", "root", "--password=${DB_PASSWORD}"]
      interval: 5s       
      timeout: 5s        
      retries: 10         
      start_period: 30s
  # ── Notification Service ───────────────────────────────────────────────────
  notification-service:
    build:
      context: ./atomic/notifications
    ports:
      - "5004:5004"
    env_file: .env

  # ── Payment Wrapper Service ────────────────────────────────────────────────
  payment-wrapper:
    build:
      context: ./atomic/payment_wrapper
    ports:
      - "5005:5005"
    env_file: .env

  # ── Teleconferencing Wrapper Service ──────────────────────────────────────
  teleconferencing-wrapper:
    build:
      context: ./atomic/teleconferencing_wrapper
    ports:
      - "5006:5006"
    env_file: .env

  # ── Error Service ─────────────────────────────────────────────────────────
  error-service:
    build:
      context: ./atomic/error
    ports:
      - "5007:5007"
    environment:
      - dbURL=mysql+pymysql://root:root@error-db:3306/error_db
      - AMQP_URL=amqp://guest:guest@rabbitmq:5672/
    depends_on:
      error-db:
        condition: service_healthy
 
  error-db:
    image: mysql:8.0
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: error_db
    ports:
      - "3311:3306"
    volumes:
      - error_db_data:/var/lib/mysql
      - ./atomic/error/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-P", "3306", "-u", "root", "--password=root"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 30s

volumes:
  doctor_db_data:
  appointment_db_data:
  patient_db_data:
  invoice_db_data:
  error_db_data: