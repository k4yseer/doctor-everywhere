services:

  # ── Doctor Service ────────────────────────────────────────────────────────
  doctor-service:
    build:
      context: ./atomic/doctor
    ports:
      - "5001:5001"
    environment:
      - dbURL=mysql+pymysql://root:root@doctor-db:3306/doctor_db
      - AMQP_URL=amqp://guest:guest@rabbitmq:5672/
    depends_on:
      doctor-db:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    volumes:
      - ./seed_scripts:/usr/src/app/seed_scripts

  doctor-db:
    image: mysql:8.0
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: doctor_db
    ports:
      - "3307:3306"
    volumes:
      - doctor_db_data:/var/lib/mysql
      - ./atomic/doctor/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-P", "3306", "-u", "root", "--password=root"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 30s

  # ── Appointment Service ───────────────────────────────────────────────────
  appointment-service:
    build:
      context: ./atomic/appointment
    ports:
      - "5002:5002"
    environment:
      - dbURL=mysql+pymysql://root:root@appointment-db:3306/appointment_db
      - AMQP_URL=amqp://guest:guest@rabbitmq:5672/
    depends_on:
      appointment-db:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    volumes:
      - ./seed_scripts:/usr/src/app/seed_scripts

  appointment-db:
    image: mysql:8.0
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: appointment_db
    ports:
      - "3308:3306"
    volumes:
      - appointment_db_data:/var/lib/mysql
      - ./atomic/appointment/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-P", "3306", "-u", "root", "--password=root"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 30s

  # ── Patient Service ───────────────────────────────────────────────────────
  patient-service:
    build:
      context: ./atomic/patient
    ports:
      - "5003:5003"
    env_file: .env
    environment:
      - AMQP_URL=amqp://guest:guest@rabbitmq:5672/
    depends_on:
      patient-db:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    volumes:
      - ./seed_scripts:/usr/src/app/seed_scripts
  patient-db:
    image: mysql:8.0
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD}
      MYSQL_DATABASE: ${DATABASE}
    ports:
      - "3309:3306"
    volumes:
      - patient_db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-P", "3306", "-u", "root", "--password=${DB_PASSWORD}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 30s

  # ── Notification Service ───────────────────────────────────────────────────
  notification-service:
    build:
      context: ./atomic/notifications
    ports:
      - "5004:5004"
    env_file: .env
    environment:
      - AMQP_URL=amqp://guest:guest@rabbitmq:5672/
    depends_on:
      rabbitmq:
        condition: service_healthy

  # ── Invoice Service ────────────────────────────────────────────────────────
  invoice-service:
    build:
      context: ./atomic/invoice
    ports:
      - "5008:5008"
    environment:
      - dbURL=mysql+pymysql://root:root@invoice-db:3306/invoice_db
    depends_on:
      invoice-db:
        condition: service_healthy
    volumes:
      - ./seed_scripts:/usr/src/app/seed_scripts

  invoice-db:
    image: mysql:8.0
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: invoice_db
    ports:
      - "3310:3306"
    volumes:
      - invoice_db_data:/var/lib/mysql
      - ./atomic/invoice/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-P", "3306", "-u", "root", "--password=root"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 30s

  # ── Delivery Service ─────────────────────────────────────────────────────
  delivery-service:
    build:
      context: ./atomic/delivery
    ports:
      - "5014:5014"
    environment:
      - dbURL=mysql+pymysql://root:root@delivery-db:3306/delivery_db
    depends_on:
      delivery-db:
        condition: service_healthy
    volumes:
      - ./seed_scripts:/usr/src/app/seed_scripts

  delivery-db:
    image: mysql:8.0
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: delivery_db
    ports:
      - "3314:3306"
    volumes:
      - delivery_db_data:/var/lib/mysql
      - ./atomic/delivery/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-P", "3306", "-u", "root", "--password=root"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 30s

  # ── Teleconferencing Wrapper Service ──────────────────────────────────────
  teleconferencing-wrapper:
    build:
      context: ./atomic/teleconferencing_wrapper
    ports:
      - "5006:5006"
    env_file: .env
    environment:
      - RABBITMQ_URL=amqp://guest:guest@rabbitmq:5672/
    depends_on:
      rabbitmq:
        condition: service_healthy

  # ── Error Service ──────────────────────────────────────────────────────────
  error-service:
    build:
      context: ./atomic/error
    ports:
      - "5007:5007"
    environment:
      - dbURL=mysql+pymysql://root:root@error-db:3306/error_db
      - AMQP_URL=amqp://guest:guest@rabbitmq:5672/
    depends_on:
      error-db:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  error-db:
    image: mysql:8.0
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: error_db
    ports:
      - "3311:3306"
    volumes:
      - error_db_data:/var/lib/mysql
      - ./atomic/error/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-P", "3306", "-u", "root", "--password=root"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 30s

  # ── Payment Wrapper Service ────────────────────────────────────────────────
  payment-wrapper:
    build:
      context: ./atomic/payment_wrapper
    ports:
      - "5005:5005"
    env_file: .env

  # ── Inventory Service ──────────────────────────────────────────────────────
  inventory-service:
    build:
      context: ./atomic/inventory
    ports:
      - "5009:5009"
    environment:
      - dbURL=mysql+pymysql://root:root@inventory-db:3306/inventory_db
      - AMQP_URL=amqp://guest:guest@rabbitmq:5672/
    depends_on:
      inventory-db:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    volumes:
      - ./seed_scripts:/usr/src/app/seed_scripts

  inventory-db:
    image: mysql:8.0
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: inventory_db
    ports:
      - "3312:3306"
    volumes:
      - inventory_db_data:/var/lib/mysql
      - ./atomic/inventory/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-P", "3306", "-u", "root", "--password=root"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 30s

  # ── RabbitMQ ───────────────────────────────────────────────────────────────
  rabbitmq:
    image: rabbitmq:3-management
    restart: always
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 15s
      retries: 15
      start_period: 120s
  # ── Queue Service ─────────────────────────────────────────────────────────
  queue-service:
    build:
      context: ./atomic/queue
    ports:
      - "5011:5011"
    environment:
      - dbURL=mysql+pymysql://root:root@queue-db:3306/queue_db
      - AMQP_URL=amqp://guest:guest@rabbitmq:5672/
    depends_on:
      queue-db:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  queue-db:
    image: mysql:8.0
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: queue_db
    ports:
      - "3313:3306"
    volumes:
      - queue_db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-P", "3306", "-u", "root", "--password=root"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 30s

  # ── Join Queue Service ───────────────────────────────────────────────────
  join-queue-service:
    build:
      context: ./composite/join_queue
    ports:
      - "5010:5010"
    environment:
      - QUEUE_SERVICE_URL=http://queue-service:5011
      - RABBITMQ_URL=amqp://guest:guest@rabbitmq:5672/
    depends_on:
      queue-service:
        condition: service_started
      rabbitmq:
        condition: service_healthy

  # ── Consultation Setup Service ───────────────────────────────────────────
  setup-consultation-service:
    build:
      context: ./composite/setup_consultation
    ports:
      - "5012:5012"
    environment:
      - QUEUE_SERVICE_URL=http://queue-service:5011
      - TELECONFERENCING_URL=http://teleconferencing-wrapper:5006
      - APPOINTMENT_SERVICE_URL=http://appointment-service:5002
      - PATIENT_SERVICE_URL=http://patient-service:5003
      - AMQP_URL=amqp://guest:guest@rabbitmq:5672/
    depends_on:
      queue-service:
        condition: service_started
      appointment-service:
        condition: service_started
      patient-service:
        condition: service_started
      teleconferencing-wrapper:
        condition: service_started
      rabbitmq:
        condition: service_healthy

  # ── Get Consultation History Service ────────────────────────────────────
  get-consultation-history-service:
    build:
      context: ./composite/get_consultation_history
    ports:
      - "5013:5013"
    environment:
      - appointmentURL=http://appointment-service:5002
      - invoiceURL=http://invoice-service:5008
      - deliveryURL=http://delivery-service:5014
      - prescriptionURL=https://personal-pehihv0m.outsystemscloud.com/ESDPrescriptionService/rest/PrescriptionAPI
      - AMQP_URL=amqp://guest:guest@rabbitmq:5672/
    depends_on:
      appointment-service:
        condition: service_started
      invoice-service:
        condition: service_started
      delivery-service:
        condition: service_started
      rabbitmq:
        condition: service_healthy

  kong-dbless:
    image: kong:latest
    restart: always
    environment:
      KONG_DATABASE: "off"
      KONG_DECLARATIVE_CONFIG: /usr/local/kong/declarative/kong.yml
      
      KONG_PROXY_LISTEN: 0.0.0.0:8000
      KONG_ADMIN_LISTEN: 0.0.0.0:8001
      KONG_ADMIN_GUI_LISTEN: 0.0.0.0:8002
      KONG_ADMIN_GUI_URL: http://localhost:8002
      
      KONG_PROXY_ACCESS_LOG: /dev/stdout
      KONG_PROXY_ERROR_LOG: /dev/stderr
    ports:
      - "8000:8000" # Traffic from Frontend
      - "8001:8001" # Admin API
      - "8002:8002" # Kong Manager GUI (Read-Only)
    volumes:
      - ./kong.yml:/usr/local/kong/declarative/kong.yml

  # ── Make Prescription Composite ───────────────────────────────────────────
  make-prescription:
    build:
      context: ./composite/make_prescription
    ports:
      - "5015:5015"
    environment:
      - PATIENT_SERVICE_URL=http://patient-service:5003
      - INVENTORY_SERVICE_URL=http://inventory-service:5009
      - PRESCRIPTION_SERVICE_URL=https://personal-pehihv0m.outsystemscloud.com/ESDPrescriptionService/rest/PrescriptionAPI
      - AMQP_URL=amqp://guest:guest@rabbitmq:5672/
      - EXCHANGE_NAME=topic_logs
    depends_on:
      patient-service:
        condition: service_started
      inventory-service:
        condition: service_started
      rabbitmq:
        condition: service_healthy
  # ── Swagger UI (Aggregated API Docs) ─────────────────────────────────────
  swagger-ui:
    build:
      context: ./swagger-ui
    ports:
      - "8080:8080"
    depends_on:
      - doctor-service
      - appointment-service
      - patient-service
      - payment-wrapper
      - teleconferencing-wrapper
      - error-service
      - invoice-service
      - inventory-service
      - queue-service
      - delivery-service
      - join-queue-service
      - setup-consultation-service
      - make-prescription
      - make-payment

  # ── Prometheus (Time-Series Database) ────────────────────────────────────
  prometheus:
    image: prom/prometheus:latest
    restart: always
    ports:
      - "9090:9090"
    volumes:
      # Mount the config file you just created
      - ./prometheus.yml:/etc/prometheus/prometheus.yml 
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
    depends_on:
      - kong-dbless

  # ── Grafana (Data Visualization Dashboard) ───────────────────────────────
  grafana:
    image: grafana/grafana:latest
    restart: always
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
    depends_on:
      - prometheus
    volumes:
      # Mounts BOTH the datasources and dashboards config files
      - ./grafana/provisioning:/etc/grafana/provisioning
      # Mounts the actual JSON dashboard file
      - ./grafana/dashboards:/var/lib/grafana/dashboards

  # ── Ngrok (Public Tunnel to Kong) ───────────────────────────────────
  ngrok:
    image: ngrok/ngrok:latest
    restart: always
    ports:
      # This exposes the local ngrok dashboard so you can check your URL
      - "4040:4040"
    environment:
      - NGROK_AUTHTOKEN=${NGROK_AUTHTOKEN}
    command:
      - "http"
      - "kong-dbless:8000"
      - "--domain=hyacinth-brightish-adversatively.ngrok-free.dev"
    depends_on:
      - kong-dbless

  # ── Make Payment Composite ────────────────────────────────────────────────
  make-payment:
    build:
      context: ./composite/make_payment
    ports:
      - "5016:5016"
    environment:
      - STRIPE_WRAPPER_URL=http://payment-wrapper:5005
      - INVOICE_SERVICE_URL=http://invoice-service:5008
      - APPOINTMENT_SERVICE_URL=http://appointment-service:5002
      - DELIVERY_SERVICE_URL=http://delivery-service:5014
      - INVENTORY_SERVICE_URL=http://inventory-service:5009
      - AMQP_URL=amqp://guest:guest@rabbitmq:5672/
    depends_on:
      - payment-wrapper
      - invoice-service
      - appointment-service
      - delivery-service
      - inventory-service
      - rabbitmq

volumes:
  doctor_db_data:
  appointment_db_data:
  patient_db_data:
  invoice_db_data:
  delivery_db_data:
  error_db_data:
  inventory_db_data:
  queue_db_data:
