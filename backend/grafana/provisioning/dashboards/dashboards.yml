# grafana/provisioning/dashboards/dashboards.yml
apiVersion: 1
providers:
  - name: 'Default Dashboards'
    orgId: 1
    folder: ''
    type: file
    disableDeletion: false
    updateIntervalSeconds: 10
    options:
      # This is the path INSIDE the Grafana container
      path: /var/lib/grafana/dashboards