_format_version: "3.0"
_transform: true

services:
  - name: setup-consultation-service
    url: http://setup-consultation-service:5012
    routes:
      - name: setup-consultation-route
        paths:
          - /api/setup-consultation
        strip_path: false

  - name: join-queue-service
    url: http://join-queue-service:5010
    routes:
      - name: join-queue-route
        paths:
          - /api/join-queue
        strip_path: false
      - name: join-queue-status-route
        paths:
          - ~/join-queue/status/(.+)
        strip_path: false
        
  - name: get-consultation-history-service
    url: http://get-consultation-history-service:5013
    routes:
      - name: get-consultation-history-route
        paths:
          - /graphql
        strip_path: false

  - name: make-payment 
    url: http://make-payment:5016 
    routes: 
      - name: make-payment-route 
        paths: 
          - /make-payment 
        strip_path: false

  - name: make-prescription
    url: http://make-prescription:5015
    routes:
      - name: make-prescription-route
        paths:
          - /api/make-prescription
        strip_path: false
  
  - name: rabbitmq-native-api
    url: http://rabbitmq:15672
    routes:
      - name: outsystems-rabbitmq-route
        paths:
          - /api/webhook/rabbitmq
        strip_path: true

  # ── Atomic services ──────────────────────────────────────────────
  # Strategy: service URL includes the backend route prefix (e.g. /queue).
  # Kong strips /api/queue, appends the remainder to the service URL,
  # so /api/queue/head → strip → /head → upstream /queue/head. ✓

  - name: inventory-atomic-service
    url: http://inventory-service:5009/inventory
    routes:
      - name: inventory-route
        paths:
          - /api/inventory
        strip_path: true

  - name: queue-atomic-service
    url: http://queue-service:5011/queue
    routes:
      - name: queue-route
        paths:
          - /api/queue
        strip_path: true

  - name: patient-atomic-service
    url: http://patient-service:5003/patients
    routes:
      - name: patient-route
        paths:
          - /api/patients
        strip_path: true

  # Singular /patient routes (details, check-allergies)
  - name: patient-singular-service
    url: http://patient-service:5003/patient
    routes:
      - name: patient-singular-route
        paths:
          - /api/patient
        strip_path: true

  - name: appointment-atomic-service
    url: http://appointment-service:5002/appointments
    routes:
      - name: appointment-route
        paths:
          - /api/appointments
        strip_path: true

plugins:
  - name: cors
    config:
      origins:
        - "*"
      methods:
        - GET
        - POST
        - PUT
        - DELETE
        - OPTIONS
      headers:
        - Accept
        - Accept-Version
        - Content-Length
        - Content-Type
      exposed_headers:
        - X-Auth-Token
      credentials: true
      max_age: 3600

  - name: cors
    route: get-consultation-history-route
    config:
      origins:
        - "http://localhost:5173"
      methods:
        - GET
        - POST
        - OPTIONS
      headers:
        - Accept
        - Content-Type
        - Authorization
      exposed_headers:
        - X-Auth-Token
      credentials: true
      max_age: 3600
      preflight_continue: false

  - name: prometheus
    config:
      status_code_metrics: true
      latency_metrics: true
      bandwidth_metrics: true
      upstream_health_metrics: true