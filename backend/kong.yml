_format_version: "3.0"
_transform: true

services:
  - name: setup-consultation-service
    url: http://setup-consultation-service:5012
    routes:
      - name: setup-consultation-route
        paths:
          - /setup-consultation
        strip_path: false

  - name: join-queue-service
    url: http://join-queue-service:5010
    routes:
      - name: join-queue-route
        paths:
          - /join-queue
        strip_path: false
      - name: join-queue-status-route
        paths:
          - ~/join-queue/status/(.+)
        strip_path: false
        
  - name: get-consultation-history-service
    url: http://get-consultation-history-service:5013
    routes:
      - name: get-consultation-history-route
        paths:
          - ~/consultation-history/(.+)
        strip_path: false

  - name: make-payment 
    url: http://make-payment:5016 
    routes: 
      - name: make-payment-route 
        paths: 
          - /make-payment 
        strip_path: false

  - name: make-prescription
    url: http://make-prescription:5015
    routes:
      - name: make-prescription-route
        paths:
          - /make-prescription
        strip_path: false
  
  - name: rabbitmq-native-api
    url: http://rabbitmq:15672
    routes:
      - name: outsystems-rabbitmq-route
        paths:
          - /api/webhook/rabbitmq
        strip_path: true

plugins:
  - name: cors
    config:
      origins:
        - "*"             
      methods:
        - GET
        - POST
        - PUT
        - DELETE
        - OPTIONS
      headers:
        - Accept
        - Accept-Version
        - Content-Length
        - Content-Type
      exposed_headers:
        - X-Auth-Token
      credentials: true
      max_age: 3600
  - name: prometheus
    config:
      status_code_metrics: true
      latency_metrics: true
      bandwidth_metrics: true
      upstream_health_metrics: true