server {
    listen 8080;

    root /usr/share/nginx/html;
    index index.html;

    # Docker's internal DNS — required for lazy hostname resolution when using
    # variables in proxy_pass (so nginx doesn't crash if a service isn't up yet).
    resolver 127.0.0.11 valid=10s;

    # Each location captures the path after the prefix with a regex group ($1),
    # then constructs the upstream URL explicitly — this correctly strips the
    # /specs/<service>/ prefix before forwarding to the Flask service.

    location ~ ^/specs/doctor/(.+)$ {
        set $upstream http://doctor-service:5001;
        proxy_pass $upstream/$1;
        proxy_set_header Host $host;
    }

    location ~ ^/specs/appointment/(.+)$ {
        set $upstream http://appointment-service:5002;
        proxy_pass $upstream/$1;
        proxy_set_header Host $host;
    }

    location ~ ^/specs/patient/(.+)$ {
        set $upstream http://patient-service:5003;
        proxy_pass $upstream/$1;
        proxy_set_header Host $host;
    }

    location ~ ^/specs/payment-wrapper/(.+)$ {
        set $upstream http://payment-wrapper:5005;
        proxy_pass $upstream/$1;
        proxy_set_header Host $host;
    }

    location ~ ^/specs/teleconferencing/(.+)$ {
        set $upstream http://teleconferencing-wrapper:5006;
        proxy_pass $upstream/$1;
        proxy_set_header Host $host;
    }

    location ~ ^/specs/error/(.+)$ {
        set $upstream http://error-service:5007;
        proxy_pass $upstream/$1;
        proxy_set_header Host $host;
    }

    location ~ ^/specs/invoice/(.+)$ {
        set $upstream http://invoice-service:5008;
        proxy_pass $upstream/$1;
        proxy_set_header Host $host;
    }

    location ~ ^/specs/inventory/(.+)$ {
        set $upstream http://inventory-service:5009;
        proxy_pass $upstream/$1;
        proxy_set_header Host $host;
    }

    location ~ ^/specs/join-queue/(.+)$ {
        set $upstream http://join-queue-service:5010;
        proxy_pass $upstream/$1;
        proxy_set_header Host $host;
    }

    location ~ ^/specs/queue/(.+)$ {
        set $upstream http://queue-service:5011;
        proxy_pass $upstream/$1;
        proxy_set_header Host $host;
    }

    location ~ ^/specs/setup-consultation/(.+)$ {
        set $upstream http://setup-consultation-service:5012;
        proxy_pass $upstream/$1;
        proxy_set_header Host $host;
    }

    location ~ ^/specs/delivery/(.+)$ {
        set $upstream http://delivery-service:5014;
        proxy_pass $upstream/$1;
        proxy_set_header Host $host;
    }

    location ~ ^/specs/make-prescription/(.+)$ {
        set $upstream http://make-prescription:5015;
        proxy_pass $upstream/$1;
        proxy_set_header Host $host;
    }

    location ~ ^/specs/make-payment/(.+)$ {
        set $upstream http://make-payment:5016;
        proxy_pass $upstream/$1;
        proxy_set_header Host $host;
    }
}
